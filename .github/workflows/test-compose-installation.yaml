name: test-docker-compose
on:
  workflow_call:
    inputs:
      image-tag:
        description: "Name of the image tag to test with"
        type: string
        required: true

permissions:
  contents: read

jobs:
  test:
    name: Test Compose installation
    runs-on: ubuntu-24.04
    env:
      RECRUIT_IMAGE_BASE_NAME: ghcr.io/${{ github.repository }}
      RECRUIT_IMAGE_TAG: ${{ inputs.image-tag }}
    steps:
      # <https://docs.docker.com/storage/containerd/>
      # via <https://github.com/docker/setup-buildx-action/issues/257>
      - name: Set up containerd image store
        shell: bash
        run: |
          [ -f /etc/docker/daemon.json ] || echo "{}" | sudo tee /etc/docker/daemon.json
          jq '. | .+{"features": {"containerd-snapshotter": true}}' /etc/docker/daemon.json > /tmp/docker-daemon-with-containerd.json
          sudo mv /tmp/docker-daemon-with-containerd.json /etc/docker/daemon.json
          cat /etc/docker/daemon.json
          sudo systemctl restart docker

          docker info -f '{{ .DriverStatus }}'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: /tmp

      - name: Load container images
        # only load images from artifacts on PRs, otherwise the image
        # is already pushed and tagged in the registry
        if: ${{ github.event_name == 'pull_request' }}
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          ls -lsa /tmp
          docker load --input "/tmp/ghcr.io-miracum-recruit-list-${IMAGE_TAG}/image.tar"
          docker load --input "/tmp/ghcr.io-miracum-recruit-notify-${IMAGE_TAG}/image.tar"
          docker load --input "/tmp/ghcr.io-miracum-recruit-query-${IMAGE_TAG}/image.tar"
          docker load --input "/tmp/ghcr.io-miracum-recruit-query-fhir-trino-${IMAGE_TAG}/image.tar"
          docker image ls -a

      - name: Delete downloaded artifacts
        run: |
          df -h
          rm -rf /tmp/*-build-artifacts
          rm -rf /tmp/*-attestations
          df -h

      - name: Deploy using Docker Compose in staging mode
        run: |
          docker compose \
            --project-name=recruit \
            --env-file=docker-compose/.staging.env \
            -f docker-compose/docker-compose.yaml \
            -f docker-compose/docker-compose.staging.yaml up --detach

      - name: List containers
        run: |
          docker compose \
            --project-name=recruit \
            --env-file=docker-compose/.staging.env \
            -f docker-compose/docker-compose.yaml \
            -f docker-compose/docker-compose.staging.yaml ps

      - name: Run basic health probes
        run: |
          docker compose \
            --project-name=recruit \
            --env-file=docker-compose/.staging.env \
            -f docker-compose/docker-compose.yaml \
            -f docker-compose/docker-compose.staging.yaml \
            -f docker-compose/docker-compose.probe.yaml run health-probes

      - name: Display logs
        if: always()
        run: |
          docker compose \
            --project-name=recruit \
            --env-file=docker-compose/.staging.env \
            -f docker-compose/docker-compose.yaml \
            -f docker-compose/docker-compose.staging.yaml logs
