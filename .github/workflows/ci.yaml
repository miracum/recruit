name: ci
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  release:
    types:
      # If you want a workflow to run when stable and pre-releases publish, subscribe to published instead of released and prereleased.
      # <https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#release>
      - published
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

jobs:
  # the build job is intentionally *not* a matrix: a matrix job's outputs (notably the
  # per-module image-digest) are only visible to downstream jobs for the last matrix
  # instance to complete, not all of them. Splitting into one job per module lets the
  # release job reference each module's actual, unambiguous build-time digest directly,
  # instead of having to re-resolve it from the registry later (which would leave a
  # window for the tag to be repointed between build and release).
  build-query:
    name: build query
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      actions: read
      packages: write
      id-token: write
      attestations: write
    uses: miracum/.github/.github/workflows/standard-build.yaml@6dd82c72c638213b8b8dac2e93fc71e06a7bf349 # v1.22.3
    with:
      image: ghcr.io/${{ github.repository }}/query
      build-context: "src/"
      enable-build-test-layer: true
      build-args: |
        MODULE_NAME=query
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build-notify:
    name: build notify
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      actions: read
      packages: write
      id-token: write
      attestations: write
    uses: miracum/.github/.github/workflows/standard-build.yaml@6dd82c72c638213b8b8dac2e93fc71e06a7bf349 # v1.22.3
    with:
      image: ghcr.io/${{ github.repository }}/notify
      build-context: "src/"
      enable-build-test-layer: true
      build-args: |
        MODULE_NAME=notify
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build-list:
    name: build list
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      actions: read
      packages: write
      id-token: write
      attestations: write
    uses: miracum/.github/.github/workflows/standard-build.yaml@6dd82c72c638213b8b8dac2e93fc71e06a7bf349 # v1.22.3
    with:
      image: ghcr.io/${{ github.repository }}/list
      build-context: "src/list/"
      enable-build-test-layer: true
      build-args: |
        MODULE_NAME=list
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build-query-fhir-trino:
    name: build query-fhir-trino
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      actions: read
      packages: write
      id-token: write
      attestations: write
    uses: miracum/.github/.github/workflows/standard-build.yaml@6dd82c72c638213b8b8dac2e93fc71e06a7bf349 # v1.22.3
    with:
      image: ghcr.io/${{ github.repository }}/query-fhir-trino
      build-context: "src/"
      enable-build-test-layer: true
      build-args: |
        MODULE_NAME=query-fhir-trino
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: test
    runs-on: ubuntu-24.04
    needs:
      - build-query
      - build-notify
      - build-list
      - build-query-fhir-trino
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: "query"
            e2e-test-directory: "tests/e2e/"
          - module: "notify"
            e2e-test-directory: "tests/e2e/"
          - module: "list"
            e2e-test-directory: "frontend/tests/e2e/"
          - module: "query-fhir-trino"
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/${{ matrix.module }}
      # the image tag is the same for all modules, so it doesn't matter which build job we read it from.
      IMAGE_TAG: ${{ needs.build-query.outputs.image-version }}
    steps:
      # <https://docs.docker.com/storage/containerd/>
      # via <https://github.com/docker/setup-buildx-action/issues/257>
      - name: Set up containerd image store
        shell: bash
        run: |
          [ -f /etc/docker/daemon.json ] || echo "{}" | sudo tee /etc/docker/daemon.json
          jq '. | .+{"features": {"containerd-snapshotter": true}}' /etc/docker/daemon.json > /tmp/docker-daemon-with-containerd.json
          sudo mv /tmp/docker-daemon-with-containerd.json /etc/docker/daemon.json
          cat /etc/docker/daemon.json
          sudo systemctl restart docker

          docker info -f '{{ .DriverStatus }}'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # unfortunately we need to re-compute the artifact name as we can't access the matrix job's outputs.
      - uses: rlespinasse/slugify-value@a4879db1eb3db9bbee01dca36f98a8236c2b8239 # v1.4.0
        id: slugify-image
        with:
          key: BUILD_IMAGE
          value: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          publish-env: false
          slug-maxlength: nolimit

      - name: Download image
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.slugify-image.outputs.slug }}
          path: /tmp

      - name: Load image
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          ls -lsa /tmp
          docker load --input /tmp/image.tar
          docker image ls

      - name: Pull image if not in PR
        shell: bash
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker pull "${IMAGE_NAME}:${IMAGE_TAG}"
          docker image ls -a

      - name: Run container structure tests
        shell: bash
        run: |
          curl -LO https://github.com/GoogleContainerTools/container-structure-test/releases/download/v1.22.1/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64

          ./container-structure-test-linux-amd64 test --image="${IMAGE_NAME}:${IMAGE_TAG}" --config=tests/container-structure/common-tests.yaml

      - name: Run isolated smoke test
        if: ${{ matrix.e2e-test-directory != ''}}
        shell: bash
        working-directory: src/${{ matrix.module }}
        env:
          E2E_TEST_DIRECTORY: ${{ matrix.e2e-test-directory }}
        run: |
          docker compose -f "${E2E_TEST_DIRECTORY}/docker-compose.yaml" build
          docker compose -f "${E2E_TEST_DIRECTORY}/docker-compose.yaml" run tester

      - name: Print test logs and stop all running containers
        if: ${{ matrix.e2e-test-directory != '' && always()}}
        shell: bash
        working-directory: src/${{ matrix.module }}
        continue-on-error: true
        env:
          E2E_TEST_DIRECTORY: ${{ matrix.e2e-test-directory }}
        run: |
          docker compose -f "${E2E_TEST_DIRECTORY}/docker-compose.yaml" logs
          docker compose -f "${E2E_TEST_DIRECTORY}/docker-compose.yaml" down --volumes --remove-orphans

  k8s-test:
    needs:
      - build-query
      - build-notify
      - build-list
      - build-query-fhir-trino
      - test
    uses: ./.github/workflows/test-k8s-installation.yaml
    with:
      image-tag: ${{ needs.build-query.outputs.image-version }}

  docker-compose-test:
    needs:
      - build-query
      - build-notify
      - build-list
      - build-query-fhir-trino
      - test
    uses: ./.github/workflows/test-compose-installation.yaml
    with:
      image-tag: ${{ needs.build-query.outputs.image-version }}

  release:
    # the docker compose image tags only change on releases, so
    # it's sufficient to just run tests then.
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      actions: read
      contents: write # for release notes
      # for creating OIDC tokens for signing.
      id-token: write
      packages: write # for uploading container images, signatures, and attestations.
    needs:
      - k8s-test
      - docker-compose-test
      # listed directly (even though they're already transitively required via k8s-test/
      # docker-compose-test) so their per-module image-digest outputs are addressable here.
      - build-query
      - build-notify
      - build-list
      - build-query-fhir-trino
    uses: ./.github/workflows/release.yaml
    with:
      query-image-digest: ${{ needs.build-query.outputs.image-digest }}
      notify-image-digest: ${{ needs.build-notify.outputs.image-digest }}
      list-image-digest: ${{ needs.build-list.outputs.image-digest }}
      query-fhir-trino-image-digest: ${{ needs.build-query-fhir-trino.outputs.image-digest }}
    secrets:
      token: ${{ secrets.MIRACUM_BOT_SEMANTIC_RELEASE_TOKEN }}

  lint:
    uses: miracum/.github/.github/workflows/standard-lint.yaml@6dd82c72c638213b8b8dac2e93fc71e06a7bf349 # v1.22.3
    permissions:
      contents: read
      pull-requests: write
      issues: write
      security-events: write
      actions: read
    with:
      enable-validate-gradle-wrapper: false
      codeql-languages: '["javascript", "java"]'
      enable-codeql: true
      enable-verify-base-image-signature: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
