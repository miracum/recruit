name: release

on:
  workflow_call:
    inputs:
      query-image-digest:
        description: "Digest (sha256:...) of the released query image, as produced by its build job"
        required: true
        type: string
      notify-image-digest:
        description: "Digest (sha256:...) of the released notify image, as produced by its build job"
        required: true
        type: string
      list-image-digest:
        description: "Digest (sha256:...) of the released list image, as produced by its build job"
        required: true
        type: string
      query-fhir-trino-image-digest:
        description: "Digest (sha256:...) of the released query-fhir-trino image, as produced by its build job"
        required: true
        type: string
    secrets:
      token:
        description: Token used to create a PR against the miracum/charts repository
        required: true

permissions: {}

jobs:
  publish-helm-chart:
    name: publish helm chart
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      # needed for cosign
      id-token: write
    outputs:
      # JSON object mapping each module name to its released image's resolved digest,
      # e.g. {"list": "sha256:...", "query": "sha256:...", ...}. Shared with prepare-artifacts
      # so the docker-compose bundle can be pinned to the same digests without re-resolving them.
      image-digests: ${{ steps.digests.outputs.json }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Collect image digests
        id: digests
        # these come directly from each module's own build job output (docker/build-push-action's
        # `digest` output), not from re-querying the registry -- that would leave a window between
        # build and release for the tag to be repointed to a different image.
        env:
          LIST_DIGEST: ${{ inputs.list-image-digest }}
          QUERY_DIGEST: ${{ inputs.query-image-digest }}
          NOTIFY_DIGEST: ${{ inputs.notify-image-digest }}
          QUERY_FHIR_TRINO_DIGEST: ${{ inputs.query-fhir-trino-image-digest }}
        run: |
          json="$(jq -cn \
            --arg list "${LIST_DIGEST}" \
            --arg query "${QUERY_DIGEST}" \
            --arg notify "${NOTIFY_DIGEST}" \
            --arg query_fhir_trino "${QUERY_FHIR_TRINO_DIGEST}" \
            '{"list": $list, "query": $query, "notify": $notify, "query-fhir-trino": $query_fhir_trino}')"
          echo "json=${json}" >> "$GITHUB_OUTPUT"

      - name: Add helm repos and update deps
        run: |
          task helm-add-repos
          helm dep build charts/recruit

      - name: Pin image tags in values.yaml to their resolved digests
        env:
          DIGESTS: ${{ steps.digests.outputs.json }}
        run: |
          # maps the values.yaml key for each module's image block to its module/repository name
          declare -A key_for=( [list]=list [query]=query [notify]=notify [query-fhir-trino]=queryFhirTrino )
          for module in "${!key_for[@]}"; do
            key="${key_for[$module]}"
            digest="$(jq -r --arg k "${module}" '.[$k]' <<<"${DIGESTS}")"
            yq -i ".${key}.image.tag += \"@${digest}\"" charts/recruit/values.yaml
          done

      - name: Package, upload, and sign Helm chart
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          CHART_VERSION="$(yq .version charts/recruit/Chart.yaml)"

          helm package charts/recruit/
          helm push "recruit-${CHART_VERSION}.tgz" "oci://ghcr.io/${GITHUB_REPOSITORY}/charts"

          cp "recruit-${CHART_VERSION}.tgz" recruit-helm-chart.tgz

          cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY}/charts/recruit:${CHART_VERSION}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart
          path: |
            recruit-helm-chart.tgz

  prepare-artifacts:
    name: prepare artifacts
    runs-on: ubuntu-24.04
    needs:
      - publish-helm-chart
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    permissions:
      contents: write # to upload artifacts to the release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download Helm chart
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-chart
          path: /tmp

      - name: Create dist dir
        run: |
          mkdir -p dist/

      - name: Add Helm chart to dist
        run: |
          ls -lsa /tmp
          cp /tmp/recruit-helm-chart.tgz dist/

      - name: Pin image tags in docker-compose.yaml to their resolved digests
        env:
          DIGESTS: ${{ needs.publish-helm-chart.outputs.image-digests }}
        run: |
          for module in list query notify query-fhir-trino; do
            digest="$(jq -r --arg k "${module}" '.[$k]' <<<"${DIGESTS}")"
            current="$(yq -r ".services.${module}.image" docker-compose/docker-compose.yaml)"
            updated="$(sed -E "s/(RECRUIT_IMAGE_TAG:-[^}]*)/\1@${digest}/" <<<"${current}")"
            yq -i ".services.${module}.image = \"${updated}\"" docker-compose/docker-compose.yaml
          done

      - name: Build Docker Compose deployment bundle
        run: |
          cp -r docker-compose/ dist/
          tar -C dist -zcvf dist/recruit-docker-compose.tgz docker-compose/

      - name: Generate SLSA subject for release assets
        id: hash
        working-directory: dist
        run: |
          sha256sum recruit-docker-compose.tgz recruit-helm-chart.tgz > checksums.sha256
          echo "hashes=$(base64 -w0 < checksums.sha256)" >> "$GITHUB_OUTPUT"

      - name: upload assets to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1 # zizmor: ignore[superfluous-actions] upload release assets directly
        with:
          files: |
            dist/*.tgz
            dist/*.sha256

  provenance:
    needs:
      - prepare-artifacts
    permissions:
      actions: read # To read the workflow path.
      # To sign the provenance.
      id-token: write
      contents: write # To add assets to a release.
    # can't be referenced by digest. See <https://github.com/slsa-framework/slsa-github-generator#verification-of-provenance>
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses] the action requires non-pinning
    with:
      base64-subjects: "${{ needs.prepare-artifacts.outputs.hashes }}"
      upload-assets: true
